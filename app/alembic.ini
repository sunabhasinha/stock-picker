# Alembic config for the application shell's database (ADR-0005).
# Run from the repo root:  alembic -c app/alembic.ini upgrade head
# The database URL comes from the DATABASE_URL environment variable
# (see app/db/session.py) - never from this file.

[alembic]
script_location = app/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
